<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>张晓迪 - 产品经理作品集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            font-family: Arial, sans-serif;
            overflow-x: hidden;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: white;
            position: relative;
        }
        
        body {
            min-height: 100vh;
        }
        
        .hero-section {
            background: url('src/bg_compressed.png') center/cover no-repeat;
            position: relative;
            width: 100%;
        }
        
        .hero-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0.3), rgba(0,0,0,0.7));
        }
        
        .hero-content {
            position: relative;
            z-index: 1;
        }
        
        h1 {
            font-size: 4rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }
        
        .title {
            font-size: 1.5rem;
            margin-bottom: 3rem;
        }
        
        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .contact-item {
            font-size: 1.2rem;
            color: #00FFFF;
            text-decoration: underline;
            cursor: pointer;
        }
        
        .note {
            position: absolute;
            bottom: 2rem;
            right: 10%;
            font-size: 0.9rem;
            color: white;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            
            .title {
                font-size: 1.2rem;
            }
            
            .contact-item {
                font-size: 1rem;
            }
            
            .note {
                font-size: 0.8rem;
                bottom: 1rem;
            }
        }
        
        @media (max-width: 480px) {
            h1 {
                font-size: 2rem;
            }
            
            .title {
                font-size: 1rem;
            }
            
            .contact-item {
                font-size: 0.9rem;
            }
            
            .note {
                font-size: 0.7rem;
                bottom: 0.5rem;
            }
        }
        
        /* 最后一页响应式设计 */
        @media (max-width: 768px) {
            .section:last-child div div:first-child {
                font-size: 1.2rem;
            }
            
            .section:last-child div div:nth-child(2) {
                font-size: 0.9rem;
            }
        }
        
        @media (max-width: 480px) {
            .section:last-child div div:first-child {
                font-size: 1rem;
            }
            
            .section:last-child div div:nth-child(2) {
                font-size: 0.8rem;
            }
        }
        
        .section {
            height: auto;
            display: block;
            width: 100%;
            margin: 0;
            padding: 0;
        }
        
        .section img {
            width: 100%;
            height: auto;
            display: block;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <section class="hero-section" style="position: relative; width: 100%; padding-bottom: 56.25%; margin: 0; overflow: hidden;">
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; padding: 10% 10%; color: white; z-index: 2;">
            <h1 style="margin-top: 2rem; margin-bottom: 0.5rem;">张晓迪</h1>
            <div class="title" style="margin-bottom: 1rem;">产品经理 作品集</div>
            <div class="contact-info" style="gap: 0.5rem;">
                <div class="contact-item" onclick="copyToClipboard('18801613257')">18801613257</div>
                <div class="contact-item" onclick="copyToClipboard('xiaodizhangssspu@163.com')">xiaodizhangssspu@163.com</div>
            </div>
        </div>
        <div class="note" style="position: absolute; bottom: 1rem; right: 10%; font-size: 0.9rem; color: white; z-index: 1;">! 仅用于面试参考，勿作他用</div>
    </section>
    
    <section class="section">
        <img src="src/pm_02_compressed.png" alt="作品 2">
    </section>
    
    <section class="section">
        <img src="src/pm_03_compressed.png" alt="作品 3">
    </section>
    
    <section class="section">
        <img src="src/pm_04_compressed.png" alt="作品 4">
    </section>
    
    <section class="section">
        <img src="src/pm_05_compressed.png" alt="作品 5">
    </section>
    
    <section class="section" style="padding: 4rem 0; width: 100%; margin: 0; overflow: hidden;">
        <div style="text-align: center; padding: 0 10%; box-sizing: border-box; width: 100%; max-width: 100%; display: flex; flex-direction: column; align-items: center;">
            <div style="font-size: 1.5rem; margin-bottom: 2rem; font-style: italic; white-space: nowrap;">「感谢您的浏览 · 期待与您对话」</div>
            <div style="margin-bottom: 2rem; white-space: nowrap;">
                <span onclick="copyToClipboard('18801613257')" style="color: #026EF9; text-decoration: underline; margin: 0 0.5rem; cursor: pointer;">18801613257</span> / 
                <span onclick="copyToClipboard('xiaodizhangssspu@163.com')" style="color: #026EF9; text-decoration: underline; margin: 0 0.5rem; cursor: pointer;">xiaodizhangssspu@163.com</span>
            </div>
            <div style="font-size: 0.9rem; color: #666;">! 仅用于面试参考，勿作他用</div>
        </div>
    </section>
    
    <script>
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text)
                .then(() => {
                    console.log('已复制到剪贴板:', text);
                })
                .catch(err => {
                    console.error('复制失败:', err);
                });
        }
        
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });
    </script>
</body>
</html>
